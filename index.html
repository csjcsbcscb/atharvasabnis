<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0c0c0c;
            color: #d8d8d8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Accent bar at top */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #1B2A4A, #3a5a8a, #1B2A4A);
        }

        .chat-container {
            width: 100%;
            max-width: 580px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 32px 22px 18px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 1px solid #1c1c1c;
            margin-bottom: 16px;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3a8a5a;
            box-shadow: 0 0 6px rgba(58, 138, 90, 0.6);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .header p {
            font-size: 11px;
            color: #383838;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Messages */
        .messages-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .messages-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 48px;
            background: linear-gradient(to bottom, transparent, #0c0c0c);
            pointer-events: none;
            z-index: 1;
        }

        .messages {
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 4px;
            padding-bottom: 28px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 2px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

        .message { display: flex; animation: fadeUp 0.22s ease; }
        .message.bot  { justify-content: flex-start; }
        .message.user { justify-content: flex-end;   }

        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.7;
            border-radius: 16px;
        }

        .bot .bubble {
            background: #141414;
            color: #cccccc;
            border: 1px solid #1e1e1e;
            border-bottom-left-radius: 3px;
            font-weight: 300;
        }

        .user .bubble {
            background: #162035;
            color: #a8c0e0;
            border: 1px solid #1e2e4a;
            border-bottom-right-radius: 3px;
            font-size: 13px;
            font-weight: 400;
        }

        /* Typing */
        .typing-wrap { display: flex; animation: fadeUp 0.18s ease; }

        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 15px;
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            border-bottom-left-radius: 3px;
        }

        .typing span {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: #3a3a3a;
            animation: pulse 1.3s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.18s; }
        .typing span:nth-child(3) { animation-delay: 0.36s; }

        @keyframes pulse {
            0%, 65%, 100% { opacity: 0.2; transform: scale(0.85); }
            32%            { opacity: 1;   transform: scale(1.15); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0);   }
        }

        /* Replies */
        .replies-wrap {
            padding-top: 12px;
            border-top: 1px solid #161616;
            min-height: 44px;
            flex-shrink: 0;
        }
        .replies { display: flex; flex-wrap: wrap; gap: 6px; }

        .reply-btn {
            background: transparent;
            color: #686868;
            border: 1px solid #2c2c2c;
            padding: 8px 14px;
            min-height: 36px;
            border-radius: 20px;
            font-size: 12.5px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .reply-btn:hover {
            background: #162035;
            border-color: #1e2e4a;
            color: #a8c0e0;
            transform: translateY(-1px);
        }

        .reply-btn:active {
            transform: scale(0.97);
            background: #162035;
            color: #a8c0e0;
        }

        .home-btn {
            color: #404040;
            border-color: #242424;
            font-size: 11.5px;
        }

        .home-btn:hover {
            background: #161616;
            border-color: #333;
            color: #888;
            transform: none;
        }

        /* Footer */
        .footer { padding-top: 10px; display: flex; justify-content: flex-end; }

        .restart-btn {
            background: none; border: none;
            color: #333;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.04em;
            transition: color 0.2s;
            padding: 4px 0;
            touch-action: manipulation;
        }

        .restart-btn:hover { color: #666; }

        a { color: #4a78b8; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Mobile */
        @media (max-width: 600px) {
            body { align-items: flex-start; }

            .chat-container {
                padding: 16px 16px 12px;
                height: 100dvh;
                height: -webkit-fill-available;
            }

            .header { padding-bottom: 12px; margin-bottom: 12px; }
            .header h1 { font-size: 12px; }
            .header p  { font-size: 10px; }

            .bubble {
                max-width: 90%;
                font-size: 14px;
                padding: 10px 13px;
            }

            .reply-btn {
                font-size: 13px;
                padding: 9px 14px;
                min-height: 40px;
            }

            .replies { gap: 7px; }
            .replies-wrap { padding-top: 10px; }
        }

        @media (max-width: 380px) {
            .bubble { max-width: 94%; font-size: 13.5px; }
            .reply-btn { font-size: 12.5px; padding: 8px 12px; }
        }
    </style>
</head>

// ENGINE
const messagesEl = document.getElementById('messages');
const repliesEl  = document.getElementById('replies');
let busy = false;

const sleep = ms => new Promise(r => setTimeout(r, ms));

function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function formatText(t) {
    return t
        .replace(/\n/g, '<br>')
        .replace(/thesabnis@gmail\.com/g,
            '<a href="mailto:thesabnis@gmail.com">thesabnis@gmail.com</a>')
        .replace(/linkedin\.com\/in\/atharvasabnis/g,
            '<a href="https://linkedin.com/in/atharvasabnis" target="_blank">linkedin.com/in/atharvasabnis</a>')
        .replace(/\+971 55 116 6906/g,
            '<a href="tel:+971551166906">+971 55 116 6906</a>');
}

function addBubble(text, type) {
    const wrap = document.createElement('div');
    wrap.className = `message ${type}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
}

function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'typing-wrap';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(wrap);
    scrollBottom();
}

function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

async function playMessages(msgs) {
    for (let i = 0; i < msgs.length; i++) {
        showTyping();
        const delay = Math.max(500, Math.min(msgs[i].length * 19, 1500));
        await sleep(delay);
        hideTyping();
        addBubble(msgs[i], 'bot');
        if (i < msgs.length - 1) await sleep(200);
    }
}

function showReplies(replies) {
    repliesEl.innerHTML = '';
    replies.forEach(r => {
        const btn = document.createElement('button');
        btn.className = 'reply-btn';
        btn.textContent = r.label;
        btn.addEventListener('click', () => handleReply(r));
        repliesEl.appendChild(btn);
    });
    // Always show a way back — unless we're already at the top-level persona selector
    const atTop = replies.some(r =>
        r.next === 'founder_intro' || r.next === 'recruiter_intro' || r.next === 'hm_intro'
    );
    if (!atTop) {
        const home = document.createElement('button');
        home.className = 'reply-btn home-btn';
        home.textContent = '↩ start over';
        home.addEventListener('click', () => handleReply({ label: '↩ start over', next: 'intro' }));
        repliesEl.appendChild(home);
    }
}

async function handleReply(reply) {
    if (busy) return;
    busy = true;
    repliesEl.innerHTML = '';
    addBubble(reply.label, 'user');
    await sleep(300);
    const scene = data[reply.next];
    await playMessages(scene.messages);
    showReplies(scene.replies);
    busy = false;
}

async function start() {
    busy = true;
    await sleep(400);
    await playMessages(data.intro.messages);
    showReplies(data.intro.replies);
    busy = false;
}

function restart() {
    if (busy) return;
    messagesEl.innerHTML = '';
    repliesEl.innerHTML = '';
    start();
}

start();
</script>
